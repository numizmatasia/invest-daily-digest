          PAYLOAD
          base64 --decode /tmp/stage4_v3_payload.b64 > /tmp/stage4_v3_payload.tar.gz
          test "$(sha256sum /tmp/stage4_v3_payload.tar.gz | awk '{print $1}')" = "$PACKAGE_ARCHIVE_SHA256"
          rm -rf /tmp/stage4_v3_payload
          mkdir -p /tmp/stage4_v3_payload
          python - <<'PYINSTALL'
          import hashlib
          import json
          from pathlib import Path, PurePosixPath
          import shutil
          import tarfile

          archive = Path('/tmp/stage4_v3_payload.tar.gz')
          extract_root = Path('/tmp/stage4_v3_payload')
          manifest_rel = 'docs/STAGE4_PACKAGE_MANIFEST_v3.0.json'
          allowed_prefixes = ('stage4/', 'tests/stage4/', 'config/stage4/', 'docs/STAGE4_')
          allowed_exact = {'tests/stage4_helpers.py'}

          with tarfile.open(archive, 'r:gz') as tf:
              for member in tf.getmembers():
                  rel = PurePosixPath(member.name)
                  if rel.is_absolute() or '..' in rel.parts or member.issym() or member.islnk():
                      raise SystemExit(f'Unsafe package member: {member.name}')
                  if not member.isfile():
                      raise SystemExit(f'Non-file package member: {member.name}')
                  name = rel.as_posix()
                  if name not in allowed_exact and not any(name.startswith(prefix) for prefix in allowed_prefixes):
                      raise SystemExit(f'Disallowed package path: {name}')
              tf.extractall(extract_root)

          if any(
              p.relative_to(extract_root).as_posix().startswith('.github/workflows/')
              for p in extract_root.rglob('*') if p.is_file()
          ):
              raise SystemExit('Package must not contain workflow files')

          manifest_path = extract_root / manifest_rel
          manifest = json.loads(manifest_path.read_text(encoding='utf-8'))
          expected = {item['path']: item for item in manifest['files']}
          actual = {
              p.relative_to(extract_root).as_posix(): p
              for p in extract_root.rglob('*')
              if p.is_file() and p != manifest_path
          }
          if set(actual) != set(expected):
              raise SystemExit(f'Package file set mismatch: expected={sorted(expected)} actual={sorted(actual)}')
          for rel, path in actual.items():
              data = path.read_bytes()
              item = expected[rel]
              if len(data) != int(item['size_bytes']):
                  raise SystemExit(f'Package size mismatch: {rel}')
              if hashlib.sha256(data).hexdigest() != item['sha256']:
                  raise SystemExit(f'Package hash mismatch: {rel}')

          for rel in sorted(actual):
              source = extract_root / rel
              target = Path(rel)
              target.parent.mkdir(parents=True, exist_ok=True)
              shutil.copy2(source, target)
          target_manifest = Path(manifest_rel)
          target_manifest.parent.mkdir(parents=True, exist_ok=True)
          shutil.copy2(manifest_path, target_manifest)
          print(f'Applied Stage 4 v3 payload: {len(actual) + 1} files')
          PYINSTALL

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-stage3.txt

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-stage3.txt

      - name: Verify current portfolio and watchlist compatibility
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PYCOMPAT'
          import json
          from pathlib import Path
          from stage4.portfolio_loader import load_current_portfolio, load_watchlist

          portfolio = load_current_portfolio(json.loads(Path('portfolio.json').read_text(encoding='utf-8')))
          watchlist, warnings, _ = load_watchlist(json.loads(Path('watchlist.json').read_text(encoding='utf-8')))
          assert set(portfolio.brokers) == {'Freedom', 'Paidax'}
          assert portfolio.freshness_status == 'DECLARED_CURRENT'
          assert 'PORTFOLIO_COMPOSITION_DECLARED_CURRENT_UNTIL_USER_REPORTS_CHANGE' in portfolio.warnings
          assert watchlist
          assert not warnings
          print(f'Compatibility PASS: {sum(len(v.positions) for v in portfolio.brokers.values())} positions, {len(watchlist)} watchlist tickers')
          PYCOMPAT

      - name: Compile Stage 3 and Stage 4
        shell: bash
        run: |
          set -euo pipefail
          python -m compileall -q infra storage stage4 tests/stage3 tests/stage4 tests/stage4_helpers.py

      - name: Run Stage 3 regression and PostgreSQL tests
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest -q tests/stage3

      - name: Run Stage 4 freshness and report tests
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest -q tests/stage4

      - name: Run project release gate
        shell: bash
        run: |
          set -euo pipefail
          python test_release_gate.py

      - name: Verify v3 hard guards and protected files
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PYVERIFY'
          import hashlib
          import json
          from pathlib import Path

          config = json.loads(Path('config/stage4/SHADOW_RUNTIME_REQUIREMENTS.json').read_text(encoding='utf-8'))
          assert config['schema_version'] == '3.0'
          assert config['config_version'] == 'stage4-shadow-v3.0'
          assert config['mode'] == 'SHADOW_ONLY'
          guards = config['hard_guards']
          assert guards['modify_main_py'] is False
          assert guards['modify_daily_workflow'] is False
          assert guards['production_delivery_enabled'] is False
          assert guards['keyword_is_event_proof'] is False
          freshness = config['freshness_filters']
          assert freshness['technical_analysis_is_not_event'] is True
          assert freshness['old_event_allowed_only_with_material_update_inside_window'] is True
          assert config['portfolio_contract']['composition_current_until_user_reports_change'] is True
          assert not Path('stage4/hunting.py').exists()
          assert not Path('stage4/market_data.py').exists()

          baseline = json.loads(Path('/tmp/STAGE4_V3_PROTECTED_BASELINE.json').read_text(encoding='utf-8'))
          failures = []
          for item in baseline['files']:
              path = Path(item['path'])
              if not path.is_file():
                  failures.append(f'missing protected file: {path}')
              elif hashlib.sha256(path.read_bytes()).hexdigest() != item['sha256']:
                  failures.append(f'changed protected file: {path}')
          if failures:
              raise SystemExit('\n'.join(failures))
          print(f'Protected files PASS: {len(baseline["files"])}')
          PYVERIFY

      - name: Verify exact allowed change set
        shell: bash
        run: |
          set -euo pipefail
          find . -type d -name '__pycache__' -prune -exec rm -rf {} +
          find . -type d -name '.pytest_cache' -prune -exec rm -rf {} +
          find . -type f \( -name '*.pyc' -o -name '*.pyo' \) -delete
          git diff --check
          python - <<'PYCHANGES'
          import json
          import subprocess
          from pathlib import Path

          def allowed(path: str) -> bool:
              return (
                  path.startswith('stage4/')
                  or path.startswith('tests/stage4/')
                  or path.startswith('config/stage4/')
                  or path.startswith('docs/STAGE4_')
                  or path == 'tests/stage4_helpers.py'
              )

          manifest = json.loads(Path('docs/STAGE4_PACKAGE_MANIFEST_v3.0.json').read_text(encoding='utf-8'))
          expected_package = {item['path'] for item in manifest['files']} | {'docs/STAGE4_PACKAGE_MANIFEST_v3.0.json'}
          for rel in expected_package:
              if not Path(rel).is_file():
                  raise SystemExit(f'Missing package file after update: {rel}')

          changed = set(subprocess.check_output(['git', 'diff', '--name-only'], text=True).splitlines())
          untracked = set(subprocess.check_output(['git', 'ls-files', '--others', '--exclude-standard'], text=True).splitlines())
          actual = changed | untracked
          disallowed = sorted(path for path in actual if not allowed(path))
          if disallowed:
              raise SystemExit(f'Disallowed changed paths: {disallowed}')
          unexpected = sorted(actual - expected_package)
          if unexpected:
              raise SystemExit(f'Unexpected mutable paths: {unexpected}')
          if not actual:
              raise SystemExit('No Stage 4 v3 changes detected')
          print(f'Allowed change set PASS: {len(actual)} changed or new files')
          PYCHANGES

      - name: Commit and push Stage 4 v3 update
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stage4 tests/stage4 tests/stage4_helpers.py config/stage4 docs/STAGE4_*
          test -n "$(git status --porcelain)"
          git commit -m "Strengthen Stage 4 freshness filters and report format"
          git push origin "HEAD:refs/heads/$TARGET_BRANCH"

      - name: Stage 4 v3 update passed
        shell: bash
        run: |
          echo "STAGE 4 FRESHNESS AND REPORT V3: PASS"
          echo "Updated isolated branch: $TARGET_BRANCH"
          echo "Old dated events, technical forecasts and future calendar events are separated before rendering."
          echo "Production main.py and daily.yml remain unchanged by this updater."
