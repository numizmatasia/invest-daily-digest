name: Update Stage 4 Freshness and Report v3

on:
  push:
    branches:
      - stage3-foundation
    paths:
      - ".github/workflows/UPDATE_STAGE4_FRESHNESS_REPORT_V3.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-stage4-freshness-report-v3
  cancel-in-progress: false

jobs:
  update-and-test:
    if: github.repository == 'numizmatasia/invest-daily-digest'
    runs-on: ubuntu-latest
    timeout-minutes: 35

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: invest
          POSTGRES_PASSWORD: invest_test
          POSTGRES_DB: invest_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U invest -d invest_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgresql://invest:invest_test@localhost:5432/invest_test
      RELEASE_GATE_TARGET: main.py
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      TARGET_BRANCH: stage4-morning-portfolio
      PACKAGE_ARCHIVE_SHA256: 340f5ce2508fc24fc34f651023907dd9a3479acca8c54729a663070e518d260e

    steps:
      - name: Check out control branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify control branch and target branch
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_REPOSITORY" = "numizmatasia/invest-daily-digest"
          test "$GITHUB_REF_NAME" = "stage3-foundation"
          git ls-remote --exit-code --heads origin "$TARGET_BRANCH" >/dev/null
          git fetch --no-tags origin "$TARGET_BRANCH"
          git switch -C "$TARGET_BRANCH" "origin/$TARGET_BRANCH"
          test -f main.py
          test -f test_release_gate.py
          test -f requirements.txt
          test -f requirements-stage3.txt
          test -f portfolio.json
          test -f watchlist.json
          test -d infra
          test -d storage
          test -d tests/stage3
          test -d stage4
          test -d tests/stage4

      - name: Capture protected Stage 4 branch baseline
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PYBASELINE'
          import hashlib
          import json
          import subprocess
          from pathlib import Path

          def mutable(path: str) -> bool:
              return (
                  path.startswith('stage4/')
                  or path.startswith('tests/stage4/')
                  or path.startswith('config/stage4/')
                  or path.startswith('docs/STAGE4_')
                  or path == 'tests/stage4_helpers.py'
              )

          tracked = subprocess.check_output(['git', 'ls-files', '-z']).split(b'\0')
          protected = []
          for raw in tracked:
              if not raw:
                  continue
              rel = raw.decode('utf-8')
              if mutable(rel):
                  continue
              path = Path(rel)
              if not path.is_file():
                  raise SystemExit(f'Missing protected tracked file: {rel}')
              protected.append({
                  'path': rel,
                  'sha256': hashlib.sha256(path.read_bytes()).hexdigest(),
              })
          Path('/tmp/STAGE4_V3_PROTECTED_BASELINE.json').write_text(
              json.dumps({'files': protected}, indent=2), encoding='utf-8'
          )
          print(f'Protected baseline captured: {len(protected)} files')
          PYBASELINE

