          PAYLOAD
          base64 --decode /tmp/stage4_payload.b64 > /tmp/stage4_payload.tar.gz
          test "$(sha256sum /tmp/stage4_payload.tar.gz | awk '{print $1}')" = "$PACKAGE_ARCHIVE_SHA256"
          rm -rf /tmp/stage4_payload
          mkdir -p /tmp/stage4_payload
          python - <<'PYINSTALL'
          import hashlib
          import json
          from pathlib import Path, PurePosixPath
          import shutil
          import tarfile

          archive = Path('/tmp/stage4_payload.tar.gz')
          extract_root = Path('/tmp/stage4_payload')
          allowed_prefixes = (
              'stage4/',
              'tests/stage4/',
              'config/stage4/',
              'docs/STAGE4_',
          )
          allowed_exact = {'tests/stage4_helpers.py'}

          with tarfile.open(archive, 'r:gz') as tf:
              members = tf.getmembers()
              for member in members:
                  rel = PurePosixPath(member.name)
                  if rel.is_absolute() or '..' in rel.parts or member.issym() or member.islnk():
                      raise SystemExit(f"Unsafe package member: {member.name}")
                  if not member.isfile():
                      raise SystemExit(f"Non-file package member: {member.name}")
                  name = rel.as_posix()
                  if name not in allowed_exact and not any(name.startswith(prefix) for prefix in allowed_prefixes):
                      raise SystemExit(f"Disallowed package path: {name}")
              tf.extractall(extract_root)

          if any(path.relative_to(extract_root).as_posix().startswith('.github/workflows/') for path in extract_root.rglob('*') if path.is_file()):
              raise SystemExit('Push-safe package must not contain workflow files')

          manifest_path = extract_root / 'docs/STAGE4_PACKAGE_MANIFEST_v2.0.json'
          manifest = json.loads(manifest_path.read_text(encoding='utf-8'))
          expected = {item['path']: item for item in manifest['files']}
          actual = {
              path.relative_to(extract_root).as_posix(): path
              for path in extract_root.rglob('*')
              if path.is_file() and path != manifest_path
          }
          if set(actual) != set(expected):
              raise SystemExit(f"Package file set mismatch: expected={sorted(expected)} actual={sorted(actual)}")
          for rel, path in actual.items():
              item = expected[rel]
              data = path.read_bytes()
              if len(data) != int(item['size_bytes']):
                  raise SystemExit(f"Package size mismatch: {rel}")
              if hashlib.sha256(data).hexdigest() != item['sha256']:
                  raise SystemExit(f"Package hash mismatch: {rel}")

          install_paths = sorted(actual) + ['docs/STAGE4_PACKAGE_MANIFEST_v2.0.json']
          for rel in install_paths:
              source = extract_root / rel
              target = Path(rel)
              if target.exists():
                  raise SystemExit(f"Refusing to overwrite existing path: {rel}")
              target.parent.mkdir(parents=True, exist_ok=True)
              shutil.copy2(source, target)

          baseline_target = Path('docs/STAGE4_PROTECTED_BASELINES_v2.0.json')
          if baseline_target.exists():
              raise SystemExit(f"Refusing to overwrite existing path: {baseline_target}")
          shutil.copy2('/tmp/STAGE4_PROTECTED_BASELINES_v2.0.json', baseline_target)
          print(f"Stage 4 payload installed: {len(install_paths)} packaged files plus protected baseline")
          PYINSTALL

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-stage3.txt

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-stage3.txt

      - name: Verify real repository input compatibility
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PYCOMPAT'
          import json
          from pathlib import Path
          from stage4.portfolio_loader import load_current_portfolio, load_watchlist

          portfolio_raw = json.loads(Path('portfolio.json').read_text(encoding='utf-8'))
          watchlist_raw = json.loads(Path('watchlist.json').read_text(encoding='utf-8'))
          portfolio = load_current_portfolio(portfolio_raw)
          watchlist, warnings, _ = load_watchlist(watchlist_raw)
          assert set(portfolio.brokers) == {'Freedom', 'Paidax'}
          assert portfolio.freshness_status == 'UNVERIFIED'
          assert watchlist
          assert not warnings
          if portfolio.broker_weight('Freedom', 'VT') is not None and portfolio.broker_weight('Paidax', 'VT') is not None:
              assert portfolio.broker_weight('Freedom', 'VT') != portfolio.broker_weight('Paidax', 'VT')
          print(f"Repository compatibility PASS: {sum(len(v.positions) for v in portfolio.brokers.values())} positions, {len(watchlist)} watchlist tickers")
          PYCOMPAT

      - name: Compile Stage 3 and corrected Stage 4
        shell: bash
        run: |
          set -euo pipefail
          python -m compileall -q infra storage stage4 tests/stage3 tests/stage4 tests/stage4_helpers.py

      - name: Run Stage 3 regression and PostgreSQL integration tests
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest -q tests/stage3

      - name: Run corrected Stage 4 shadow tests
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest -q tests/stage4

      - name: Run existing project release gate
        shell: bash
        run: |
          set -euo pipefail
          python test_release_gate.py

      - name: Verify hard guards and protected files
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PYVERIFY'
          import hashlib
          import json
          from pathlib import Path

          config = json.loads(Path('config/stage4/SHADOW_RUNTIME_REQUIREMENTS.json').read_text(encoding='utf-8'))
          guards = config['hard_guards']
          assert config['mode'] == 'SHADOW_ONLY'
          assert guards['modify_main_py'] is False
          assert guards['modify_daily_workflow'] is False
          assert guards['stateless_bypass'] is False
          assert guards['guess_unknown_thresholds'] is False
          assert guards['keyword_is_event_proof'] is False
          assert guards['production_delivery_enabled'] is False
          assert not Path('stage4/hunting.py').exists()
          assert not Path('stage4/market_data.py').exists()

          baseline = json.loads(Path('docs/STAGE4_PROTECTED_BASELINES_v2.0.json').read_text(encoding='utf-8'))
          failures = []
          for item in baseline['files']:
              path = Path(item['path'])
              if not path.is_file():
                  failures.append(f"missing protected file: {path}")
              elif hashlib.sha256(path.read_bytes()).hexdigest() != item['sha256']:
                  failures.append(f"changed protected file: {path}")
          if failures:
              raise SystemExit('\n'.join(failures))
          print(f"Protected files PASS: {len(baseline['files'])}")
          PYVERIFY

      - name: Verify exact allowed change set
        shell: bash
        run: |
          set -euo pipefail
          find . -type d -name '__pycache__' -prune -exec rm -rf {} +
          find . -type d -name '.pytest_cache' -prune -exec rm -rf {} +
          find . -type f \( -name '*.pyc' -o -name '*.pyo' \) -delete
          git diff --exit-code
          python - <<'PYCHANGES'
          import json
          import subprocess
          from pathlib import Path

          manifest = json.loads(Path('docs/STAGE4_PACKAGE_MANIFEST_v2.0.json').read_text(encoding='utf-8'))
          expected = {item['path'] for item in manifest['files']}
          expected.add('docs/STAGE4_PACKAGE_MANIFEST_v2.0.json')
          expected.add('docs/STAGE4_PROTECTED_BASELINES_v2.0.json')
          actual = set(subprocess.check_output(
              ['git', 'ls-files', '--others', '--exclude-standard'], text=True
          ).splitlines())
          if actual != expected:
              raise SystemExit(f"Unexpected change set. expected={sorted(expected)} actual={sorted(actual)}")
          print(f"Allowed change set PASS: {len(actual)} new files")
          PYCHANGES

      - name: Commit and push isolated Stage 4 branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stage4 tests/stage4 tests/stage4_helpers.py config/stage4 docs/STAGE4_*
          test -n "$(git status --porcelain)"
          git commit -m "Add corrected Stage 4 morning portfolio shadow foundation"
          git push origin "HEAD:refs/heads/$TARGET_BRANCH"

      - name: Installation passed
        shell: bash
        run: |
          echo "STAGE 4 CORRECTED SHADOW INSTALLATION: PASS"
          echo "Created isolated branch: $TARGET_BRANCH"
          echo "Stage 3 regressions, PostgreSQL integration, Stage 4 tests and project release gate passed before push."
          echo "Production main.py and daily workflow remain unchanged."
          echo "No workflow file was pushed; this installer run is the initial Stage 4 release-gate proof."
