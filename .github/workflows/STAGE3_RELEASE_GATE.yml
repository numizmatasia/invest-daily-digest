name: Stage 3 Release Gate

on:
  push:
    branches:
      - stage3-foundation
    paths:
      - ".github/workflows/STAGE3_RELEASE_GATE.yml"
      - "PROJECT_REQUIREMENTS.json"
      - "test_release_gate.py"
      - "main.py"
      - "requirements.txt"
      - "requirements-stage3.txt"
      - "config/stage3/**"
      - "infra/**"
      - "storage/**"
      - "tests/stage3/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: stage3-release-gate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-gate:
    if: github.repository == 'numizmatasia/invest-daily-digest'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: invest
          POSTGRES_PASSWORD: invest_test
          POSTGRES_DB: invest_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U invest -d invest_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgresql://invest:invest_test@localhost:5432/invest_test
      RELEASE_GATE_TARGET: main.py
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check out current commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify repository and branch
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_REPOSITORY" = "numizmatasia/invest-daily-digest"
          test "$GITHUB_REF_NAME" = "stage3-foundation"
          test -f main.py
          test -f test_release_gate.py
          test -f PROJECT_REQUIREMENTS.json
          test -f requirements.txt
          test -f requirements-stage3.txt

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-stage3.txt

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-stage3.txt

      - name: Compile Stage 3 files
        shell: bash
        run: |
          set -euo pipefail
          python -m compileall -q             main.py             test_release_gate.py             config/stage3             infra             storage             tests/stage3

      - name: Run Stage 3 foundation tests
        shell: bash
        run: |
          set -euo pipefail
          pytest -q tests/stage3

      - name: Run project release gate
        shell: bash
        run: |
          set -euo pipefail
          python test_release_gate.py

      - name: Verify tests changed no tracked files
        shell: bash
        run: |
          set -euo pipefail
          find . -type d -name '__pycache__' -prune -exec rm -rf {} +
          find . -type f \( -name '*.pyc' -o -name '*.pyo' \) -delete
          git diff --exit-code
          test -z "$(git status --porcelain --untracked-files=all)"

      - name: Release gate passed
        shell: bash
        run: |
          echo "STAGE 3 RELEASE GATE: PASS"
          echo "Foundation tests and test_release_gate.py completed successfully."
