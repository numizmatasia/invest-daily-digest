name: Stage 4 Hourly News Accumulator

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/STAGE4_HOURLY_NEWS_ACCUMULATOR.yml"
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: read
  actions: write

concurrency:
  group: stage4-hourly-news-accumulator
  cancel-in-progress: false

env:
  STATE_ARTIFACT_NAME: stage4-news-window
  STATE_RETENTION_DAYS: "14"
  WINDOW_RETENTION_DAYS: "8"

jobs:
  accumulate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out Stage 4 shadow branch
        uses: actions/checkout@v4
        with:
          ref: stage4-morning-portfolio
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install collector dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore latest accumulated state
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p state previous_artifact

          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          import shutil
          import urllib.error
          import urllib.request
          import zipfile
          from pathlib import Path

          token = os.environ["GH_TOKEN"]
          repository = os.environ["GITHUB_REPOSITORY"]
          artifact_name = os.environ["STATE_ARTIFACT_NAME"]
          current_run_id = int(os.environ["GITHUB_RUN_ID"])



          class NoRedirect(urllib.request.HTTPRedirectHandler):
              def redirect_request(self, req, fp, code, msg, headers, newurl):
                  return None


          def download_artifact_archive(download_url, api_headers, zip_path):
              opener = urllib.request.build_opener(NoRedirect())
              request = urllib.request.Request(download_url, headers=api_headers)
              try:
                  with opener.open(request, timeout=120) as response:
                      zip_path.write_bytes(response.read())
                      return
              except urllib.error.HTTPError as error:
                  if error.code not in {301, 302, 303, 307, 308}:
                      raise
                  location = error.headers.get("Location")
                  if not location:
                      raise RuntimeError(
                          "Artifact download redirect did not include a Location header"
                      ) from error

              # GitHub redirects artifact downloads to a short-lived signed URL on
              # another host. Do not forward the GitHub Authorization header there.
              redirected_request = urllib.request.Request(
                  location,
                  headers={"User-Agent": api_headers["User-Agent"]},
              )
              with urllib.request.urlopen(redirected_request, timeout=120) as response:
                  zip_path.write_bytes(response.read())

          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "User-Agent": "stage4-hourly-news-accumulator",
          }
          list_url = (
              f"https://api.github.com/repos/{repository}/actions/artifacts"
              f"?name={artifact_name}&per_page=100"
          )

          request = urllib.request.Request(list_url, headers=headers)
          with urllib.request.urlopen(request, timeout=60) as response:
              payload = json.load(response)

          candidates = [
              item
              for item in payload.get("artifacts", [])
              if not item.get("expired", False)
              and int(item.get("workflow_run", {}).get("id", 0)) != current_run_id
          ]
          candidates.sort(key=lambda item: item.get("created_at", ""), reverse=True)

          if not candidates:
              print("No previous state artifact found; starting a new window.")
              raise SystemExit(0)

          latest = candidates[0]
          download_url = latest["archive_download_url"]
          zip_path = Path("previous_artifact/state.zip")
          download_artifact_archive(download_url, headers, zip_path)

          with zipfile.ZipFile(zip_path) as archive:
              archive.extractall("previous_artifact/unpacked")

          matches = list(Path("previous_artifact/unpacked").rglob("news_window.json"))
          if len(matches) != 1:
              raise RuntimeError(
                  f"Expected one news_window.json in previous artifact, found {len(matches)}"
              )

          shutil.copy2(matches[0], "state/news_window.json")
          print(
              "Restored state from artifact "
              f"{latest['id']} created at {latest.get('created_at')}"
          )
          PY

      - name: Collect current live RSS and radar input
        shell: bash
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          PYTHONUNBUFFERED: "1"
          TELEGRAM_BOT_TOKEN: "0000000000:DRY_RUN_PLACEHOLDER_DO_NOT_SEND"
          TELEGRAM_CHAT_ID: "0"
          GEMINI_API_KEY: ""
        run: |
          set -euo pipefail

          python - <<'PY'
          from __future__ import annotations

          import json
          from datetime import date, datetime, timezone
          from pathlib import Path
          from typing import Any

          import main


          def json_safe(value: Any) -> Any:
              if isinstance(value, dict):
                  return {str(key): json_safe(item) for key, item in value.items()}
              if isinstance(value, (list, tuple)):
                  return [json_safe(item) for item in value]
              if isinstance(value, set):
                  return sorted(
                      (json_safe(item) for item in value),
                      key=lambda item: json.dumps(item, sort_keys=True, default=str),
                  )
              if isinstance(value, (datetime, date)):
                  return value.isoformat()
              if value is None or isinstance(value, (str, int, float, bool)):
                  return value
              return str(value)


          portfolio_data = main.load_json_file("portfolio.json")
          watchlist_data = main.load_json_file("watchlist.json")
          entities = main.build_user_entities(portfolio_data, watchlist_data)

          (
              collected_articles,
              base_working,
              radar_working,
              failures,
              collection_stats,
          ) = main.collect_sources(entities)

          captured_at = datetime.now(timezone.utc).isoformat()
          payload = {
              "capture_version": "STAGE4-HOURLY-ACCUMULATOR-v1",
              "captured_at": captured_at,
              "source_status": {
                  "base_working": base_working,
                  "radar_working": radar_working,
                  "failures": failures,
              },
              "collection_stats": collection_stats,
              "articles": collected_articles,
          }
          Path("state/current_batch.json").write_text(
              json.dumps(json_safe(payload), ensure_ascii=False, indent=2),
              encoding="utf-8",
          )

          print(f"Captured articles: {len(collected_articles)}")
          print(f"RSS working: {len(base_working)}/{len(main.BASE_FEEDS)}")
          print(f"Radar working: {len(radar_working)}/3")
          print(f"Failures: {len(failures)}")
          print("Telegram was not called.")
          PY

      - name: Merge batch into rolling news window
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          import os
          import re
          from datetime import datetime, timedelta, timezone
          from pathlib import Path
          from typing import Any
          from urllib.parse import parse_qsl, urlencode, urlsplit, urlunsplit


          TRACKING_KEYS = {
              "ac",
              "cid",
              "cmpid",
              "feed",
              "feedid",
              "ocid",
              "output",
              "partner",
              "ref",
              "referrer",
              "source",
              "src",
          }


          def parse_datetime(value: Any) -> datetime | None:
              if not value:
                  return None
              text = str(value).strip().replace("Z", "+00:00")
              try:
                  result = datetime.fromisoformat(text)
              except ValueError:
                  return None
              if result.tzinfo is None:
                  result = result.replace(tzinfo=timezone.utc)
              return result.astimezone(timezone.utc)


          def normalize_text(value: Any) -> str:
              return re.sub(r"\s+", " ", str(value or "")).strip().casefold()


          def canonicalize_url(value: Any) -> str:
              raw = str(value or "").strip()
              if not raw:
                  return ""
              try:
                  parts = urlsplit(raw)
              except ValueError:
                  return raw
              query = []
              for key, item in parse_qsl(parts.query, keep_blank_values=True):
                  lowered = key.casefold()
                  if lowered.startswith("utm_") or lowered in TRACKING_KEYS:
                      continue
                  query.append((key, item))
              path = parts.path.rstrip("/") or "/"
              return urlunsplit(
                  (
                      parts.scheme.casefold(),
                      parts.netloc.casefold(),
                      path,
                      urlencode(sorted(query)),
                      "",
                  )
              )


          def sha256_text(value: str) -> str:
              return hashlib.sha256(value.encode("utf-8")).hexdigest()


          def article_identity(article: dict[str, Any]) -> tuple[str, str, str]:
              canonical_url = canonicalize_url(article.get("url"))
              normalized_title = normalize_text(article.get("title"))
              normalized_summary = normalize_text(article.get("summary"))
              domain = normalize_text(article.get("domain"))
              content_hash = sha256_text(
                  "\n".join((domain, normalized_title, normalized_summary))
              )
              stable_key = sha256_text(canonical_url or f"{domain}\n{normalized_title}")
              return stable_key, canonical_url, content_hash


          def new_record(article: dict[str, Any], seen_at: str) -> dict[str, Any]:
              stable_key, canonical_url, content_hash = article_identity(article)
              return {
                  "id": stable_key,
                  "canonical_url": canonical_url,
                  "content_hash": content_hash,
                  "first_seen_at": seen_at,
                  "last_seen_at": seen_at,
                  "seen_count": 1,
                  "aliases": [str(article.get("url") or "")],
                  "versions": [
                      {
                          "seen_at": seen_at,
                          "content_hash": content_hash,
                          "title": article.get("title", ""),
                          "summary": article.get("summary", ""),
                      }
                  ],
                  "article": article,
              }


          def merge_records(
              existing_records: list[dict[str, Any]],
              incoming_articles: list[dict[str, Any]],
              seen_at: str,
          ) -> tuple[list[dict[str, Any]], int, int]:
              by_id = {str(item["id"]): item for item in existing_records}
              by_content = {
                  str(item.get("content_hash", "")): item
                  for item in existing_records
                  if item.get("content_hash")
              }
              created = 0
              updated = 0

              for article in incoming_articles:
                  stable_key, canonical_url, content_hash = article_identity(article)
                  record = by_id.get(stable_key) or by_content.get(content_hash)
                  if record is None:
                      record = new_record(article, seen_at)
                      existing_records.append(record)
                      by_id[record["id"]] = record
                      by_content[content_hash] = record
                      created += 1
                      continue

                  record["last_seen_at"] = seen_at
                  record["seen_count"] = int(record.get("seen_count", 0)) + 1
                  aliases = record.setdefault("aliases", [])
                  raw_url = str(article.get("url") or "")
                  if raw_url and raw_url not in aliases:
                      aliases.append(raw_url)

                  if record.get("content_hash") != content_hash:
                      versions = record.setdefault("versions", [])
                      versions.append(
                          {
                              "seen_at": seen_at,
                              "content_hash": content_hash,
                              "title": article.get("title", ""),
                              "summary": article.get("summary", ""),
                          }
                      )
                      record["versions"] = versions[-10:]
                      record["content_hash"] = content_hash

                  record["canonical_url"] = canonical_url or record.get(
                      "canonical_url", ""
                  )
                  record["article"] = article
                  by_content[content_hash] = record
                  updated += 1

              return existing_records, created, updated


          def run_merge_self_test() -> None:
              first = {
                  "title": "Early market event",
                  "summary": "First important fact",
                  "url": "https://example.com/early?utm_source=rss",
                  "domain": "example.com",
                  "published_at": "2026-07-15T01:00:00+00:00",
              }
              later = {
                  "title": "Late market event",
                  "summary": "Second important fact",
                  "url": "https://example.com/late",
                  "domain": "example.com",
                  "published_at": "2026-07-15T10:00:00+00:00",
              }
              records, created, updated = merge_records([], [first], "2026-07-15T02:00:00+00:00")
              records, created2, updated2 = merge_records(
                  records, [later], "2026-07-15T11:00:00+00:00"
              )
              assert len(records) == 2
              assert created == 1 and updated == 0
              assert created2 == 1 and updated2 == 0
              records, created3, updated3 = merge_records(
                  records,
                  [{**first, "url": "https://example.com/early?utm_medium=feed"}],
                  "2026-07-15T12:00:00+00:00",
              )
              assert len(records) == 2
              assert created3 == 0 and updated3 == 1
              assert any(item["seen_count"] == 2 for item in records)


          run_merge_self_test()

          state_path = Path("state/news_window.json")
          if state_path.exists():
              state = json.loads(state_path.read_text(encoding="utf-8"))
          else:
              state = {
                  "schema_version": "stage4-news-window-v1",
                  "created_at": datetime.now(timezone.utc).isoformat(),
                  "articles": [],
                  "batches": [],
              }

          batch = json.loads(Path("state/current_batch.json").read_text(encoding="utf-8"))
          captured_at = str(batch["captured_at"])
          incoming_articles = list(batch.get("articles", []))
          records = list(state.get("articles", []))

          records, created, updated = merge_records(records, incoming_articles, captured_at)

          now = parse_datetime(captured_at) or datetime.now(timezone.utc)
          retention_days = int(os.environ["WINDOW_RETENTION_DAYS"])
          cutoff = now - timedelta(days=retention_days)

          retained_records = []
          pruned = 0
          for record in records:
              last_seen = parse_datetime(record.get("last_seen_at"))
              published = parse_datetime(record.get("article", {}).get("published_at"))
              effective_time = max(
                  (item for item in (last_seen, published) if item is not None),
                  default=now,
              )
              if effective_time < cutoff:
                  pruned += 1
                  continue
              retained_records.append(record)

          batches = list(state.get("batches", []))
          batches.append(
              {
                  "captured_at": captured_at,
                  "article_count": len(incoming_articles),
                  "new_records": created,
                  "updated_records": updated,
                  "source_status": batch.get("source_status", {}),
              }
          )
          retained_batches = []
          for item in batches:
              item_time = parse_datetime(item.get("captured_at"))
              if item_time is None or item_time >= cutoff:
                  retained_batches.append(item)

          retained_records.sort(
              key=lambda item: (
                  str(item.get("last_seen_at", "")),
                  str(item.get("first_seen_at", "")),
              ),
              reverse=True,
          )

          state.update(
              {
                  "schema_version": "stage4-news-window-v1",
                  "updated_at": captured_at,
                  "retention_days": retention_days,
                  "articles": retained_records,
                  "batches": retained_batches,
                  "last_merge": {
                      "incoming_articles": len(incoming_articles),
                      "new_records": created,
                      "updated_records": updated,
                      "pruned_records": pruned,
                      "retained_records": len(retained_records),
                  },
              }
          )
          state_path.write_text(
              json.dumps(state, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )

          domains = {
              str(item.get("article", {}).get("domain", "")).strip()
              for item in retained_records
              if str(item.get("article", {}).get("domain", "")).strip()
          }
          first_seen_values = sorted(
              str(item.get("first_seen_at", "")) for item in retained_records
          )
          summary_lines = [
              "STAGE 4 HOURLY NEWS ACCUMULATOR",
              f"Captured at: {captured_at}",
              f"Incoming articles: {len(incoming_articles)}",
              f"New unique records: {created}",
              f"Existing records refreshed: {updated}",
              f"Pruned records: {pruned}",
              f"Rolling window records: {len(retained_records)}",
              f"Distinct domains: {len(domains)}",
              f"Stored batches: {len(retained_batches)}",
              f"Oldest first_seen_at: {first_seen_values[0] if first_seen_values else 'none'}",
              f"Newest first_seen_at: {first_seen_values[-1] if first_seen_values else 'none'}",
              "Merge preservation self-test: PASS",
              "Telegram was not called.",
          ]
          Path("state/news_window_summary.txt").write_text(
              "\n".join(summary_lines) + "\n",
              encoding="utf-8",
          )
          print("\n".join(summary_lines))
          PY

      - name: Verify accumulator changed no repository files
        shell: bash
        run: |
          set -euo pipefail
          find . -type d -name '__pycache__' -prune -exec rm -rf {} +
          find . -type f \( -name '*.pyc' -o -name '*.pyo' \) -delete
          rm -rf previous_artifact
          git diff --exit-code
          unexpected="$(git status --porcelain --untracked-files=all -- ':!state')"
          if [ -n "$unexpected" ]; then
            echo "Unexpected repository changes:"
            echo "$unexpected"
            exit 1
          fi

      - name: Publish rolling state artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.STATE_ARTIFACT_NAME }}
          path: state/
          if-no-files-found: error
          retention-days: ${{ env.STATE_RETENTION_DAYS }}
          compression-level: 6

      - name: Add accumulator summary
        shell: bash
        run: cat state/news_window_summary.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Keep only the two newest state artifacts
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_ARTIFACT_ID: ${{ steps.upload.outputs.artifact-id }}
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          import urllib.request

          token = os.environ["GH_TOKEN"]
          repository = os.environ["GITHUB_REPOSITORY"]
          artifact_name = os.environ["STATE_ARTIFACT_NAME"]
          current_artifact_id = int(os.environ["CURRENT_ARTIFACT_ID"])
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "User-Agent": "stage4-hourly-news-accumulator",
          }

          list_url = (
              f"https://api.github.com/repos/{repository}/actions/artifacts"
              f"?name={artifact_name}&per_page=100"
          )
          request = urllib.request.Request(list_url, headers=headers)
          with urllib.request.urlopen(request, timeout=60) as response:
              artifacts = json.load(response).get("artifacts", [])

          active = [item for item in artifacts if not item.get("expired", False)]
          active.sort(key=lambda item: item.get("created_at", ""), reverse=True)
          keep_ids = {current_artifact_id}
          for item in active:
              if len(keep_ids) >= 2:
                  break
              keep_ids.add(int(item["id"]))

          for item in active:
              artifact_id = int(item["id"])
              if artifact_id in keep_ids:
                  continue
              delete_url = (
                  f"https://api.github.com/repos/{repository}/actions/artifacts/"
                  f"{artifact_id}"
              )
              request = urllib.request.Request(
                  delete_url,
                  headers=headers,
                  method="DELETE",
              )
              with urllib.request.urlopen(request, timeout=60) as response:
                  if response.status != 204:
                      raise RuntimeError(
                          f"Unexpected delete status {response.status} for artifact {artifact_id}"
                      )
              print(f"Deleted old state artifact {artifact_id}")
          PY
