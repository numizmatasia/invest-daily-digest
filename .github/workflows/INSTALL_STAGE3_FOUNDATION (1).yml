          STAGE3_PAYLOAD

          base64 --decode /tmp/stage3_payload.b64 > /tmp/stage3_payload.tar.gz
          echo "5291b6d030e112b38897ffef7a1d0aa8095657683fc6b11dc8c08fb330588b28  /tmp/stage3_payload.tar.gz" | sha256sum --check --strict
          tar -xzf /tmp/stage3_payload.tar.gz -C "$GITHUB_WORKSPACE"

          AFTER_MAIN="$(sha256sum main.py | awk '{print $1}')"
          AFTER_DAILY="$(sha256sum .github/workflows/daily.yml | awk '{print $1}')"
          test "$BEFORE_MAIN" = "$AFTER_MAIN"
          test "$BEFORE_DAILY" = "$AFTER_DAILY"

          python -m compileall -q infra storage tests/stage3
          python -m pip install --upgrade pip
          pip install -r requirements-stage3.txt
          pytest -q tests/stage3

          python - <<'PYMANIFEST'
          from pathlib import Path
          import hashlib, json

          root = Path('.')
          allowed_files = {
              'STAGE3_FILE_TREE.txt',
              'STAGE3_FOUNDATION_README.md',
              'STAGE3_IMPLEMENTATION_AUDIT_v1.1.md',
              'STAGE3_ORIGINAL_FILES_CHECK.json',
              'STAGE3_WEB_INSTALL_README.md',
              'pytest.ini',
              'requirements-stage3.txt',
              'tests/__init__.py',
          }
          allowed_prefixes = ('config/stage3/', 'docs/', 'infra/', 'storage/', 'tests/stage3/')
          files = []
          for p in sorted(root.rglob('*')):
              if not p.is_file():
                  continue
              rel = p.as_posix().lstrip('./')
              if rel in allowed_files or rel.startswith(allowed_prefixes):
                  data = p.read_bytes()
                  files.append({
                      'path': rel,
                      'bytes': len(data),
                      'sha256': hashlib.sha256(data).hexdigest(),
                  })
          manifest = {
              'package': 'INVEST_ASSISTANT_STAGE3_FOUNDATION_WEB_v1.1',
              'status': 'TESTED_BEFORE_COMMIT',
              'protected_files_unchanged': ['main.py', '.github/workflows/daily.yml'],
              'installer_workflow': '.github/workflows/INSTALL_STAGE3_FOUNDATION.yml',
              'files': files,
          }
          Path('STAGE3_IMPLEMENTATION_MANIFEST_v1.1.json').write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )
          PYMANIFEST

          while IFS= read -r line; do
            path="${line:3}"
            case "$path" in
              .github/workflows/INSTALL_STAGE3_FOUNDATION.yml|              STAGE3_FILE_TREE.txt|              STAGE3_FOUNDATION_README.md|              STAGE3_IMPLEMENTATION_AUDIT_v1.1.md|              STAGE3_IMPLEMENTATION_MANIFEST_v1.1.json|              STAGE3_ORIGINAL_FILES_CHECK.json|              STAGE3_WEB_INSTALL_README.md|              pytest.ini|requirements-stage3.txt|tests/__init__.py|              config/stage3/*|docs/*|infra/*|storage/*|tests/stage3/*)
                ;;
              *)
                echo "Unexpected changed path: $path"
                exit 1
                ;;
            esac
          done < <(git status --porcelain --untracked-files=all)

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add             STAGE3_FILE_TREE.txt             STAGE3_FOUNDATION_README.md             STAGE3_IMPLEMENTATION_AUDIT_v1.1.md             STAGE3_IMPLEMENTATION_MANIFEST_v1.1.json             STAGE3_ORIGINAL_FILES_CHECK.json             STAGE3_WEB_INSTALL_README.md             config/stage3 docs infra pytest.ini requirements-stage3.txt storage             tests/__init__.py tests/stage3

          if git diff --cached --quiet; then
            echo "Stage 3 payload is already installed. Tests passed."
            exit 0
          fi

          git commit -m "Add tested Stage 3 infrastructure foundation"
          git push origin HEAD:stage3-foundation
