name: Install and Test Stage 3 Foundation

on:
  push:
    branches:
      - stage3-foundation
    paths:
      - ".github/workflows/INSTALL_STAGE3_FOUNDATION.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: install-stage3-foundation
  cancel-in-progress: false

jobs:
  install-and-test:
    if: github.repository == 'numizmatasia/invest-daily-digest'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: invest
          POSTGRES_PASSWORD: invest_test
          POSTGRES_DB: invest_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U invest -d invest_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out stage3-foundation
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: stage3-foundation

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install payload, verify and test
        shell: bash
        env:
          TEST_DATABASE_URL: postgresql://invest:invest_test@localhost:5432/invest_test
        run: |
          set -euo pipefail

          test "$GITHUB_REPOSITORY" = "numizmatasia/invest-daily-digest"
          test "$GITHUB_REF_NAME" = "stage3-foundation"
          test -f main.py
          test -f .github/workflows/daily.yml

          BEFORE_MAIN="$(sha256sum main.py | awk '{print $1}')"
          BEFORE_DAILY="$(sha256sum .github/workflows/daily.yml | awk '{print $1}')"

          cat > /tmp/stage3_payload.b64 <<'STAGE3_PAYLOAD'
