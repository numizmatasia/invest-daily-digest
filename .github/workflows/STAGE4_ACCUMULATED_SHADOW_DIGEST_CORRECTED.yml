          PAYLOAD
          base64 --decode /tmp/stage4_accumulated_shadow.b64 > /tmp/stage4_accumulated_shadow.py
          export PYTHONPATH="$GITHUB_WORKSPACE${PYTHONPATH:+:$PYTHONPATH}"
          test -f "$GITHUB_WORKSPACE/main.py"
          python -m py_compile /tmp/stage4_accumulated_shadow.py
          python - <<'PYIMPORT'
          import main

          required = {
              "build_user_entities",
              "choose_representative_article",
              "classify_event_buckets",
              "cluster_articles",
              "confirmation_status",
              "deduplicate_articles",
              "importance_score",
              "load_json_file",
              "quality_filter_articles",
              "source_profile",
              "topic_event_is_material",
          }
          missing = sorted(name for name in required if not hasattr(main, name))
          if missing:
              raise RuntimeError(f"main.py is missing required interfaces: {missing}")
          print("main.py import and interface preflight: PASS")
          PYIMPORT
          python /tmp/stage4_accumulated_shadow.py

      - name: Validate shadow report
        shell: bash
        run: |
          set -euo pipefail
          test -s shadow_output/stage4_accumulated_shadow_digest.txt
          test -s shadow_output/stage4_accumulated_shadow_diagnostics.json
          test -s shadow_output/github_summary.md
          grep -q "Что делать сегодня" shadow_output/stage4_accumulated_shadow_digest.txt
          grep -q "Что действительно изменилось" shadow_output/stage4_accumulated_shadow_digest.txt
          grep -q "Новые возможности вне портфеля" shadow_output/stage4_accumulated_shadow_digest.txt
          if grep -q "ПРОВЕРИТЬ ДОПОЛНИТЕЛЬНО" shadow_output/stage4_accumulated_shadow_digest.txt; then
            echo "Repeated legacy status phrase detected."
            exit 1
          fi
          python - <<'PYVALIDATE'
          import json
          from pathlib import Path

          payload = json.loads(
              Path("shadow_output/stage4_accumulated_shadow_diagnostics.json")
              .read_text(encoding="utf-8")
          )
          diagnostics = payload.get("diagnostics", {})
          required = {
              "window_articles",
              "clusters",
              "evaluated",
              "confirmed",
              "rejected",
              "opportunities",
          }
          missing = required - set(diagnostics)
          if missing:
              raise RuntimeError(f"Missing diagnostic fields: {sorted(missing)}")
          print("Shadow report validation: PASS")
          PYVALIDATE

      - name: Verify production files remain unchanged
        shell: bash
        run: |
          set -euo pipefail
          find . -type d -name '__pycache__' -prune -exec rm -rf {} +
          find . -type f \( -name '*.pyc' -o -name '*.pyo' \) -delete
          git diff --exit-code
          test -z "$(git status --porcelain --untracked-files=all -- ':!state' ':!shadow_output' ':!accumulator_artifact')"

      - name: Add report to GitHub summary
        shell: bash
        run: cat shadow_output/github_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload accumulated shadow report
        uses: actions/upload-artifact@v4
        with:
          name: stage4-accumulated-shadow-digest
          path: shadow_output/
          if-no-files-found: error
          compression-level: 6
