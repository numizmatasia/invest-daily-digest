name: Stage 4 Accumulated Shadow Digest - Approved Freshness

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/STAGE4_ACCUMULATED_SHADOW_DIGEST_V4.yml"

permissions:
  contents: read
  actions: read

concurrency:
  group: stage4-accumulated-shadow-digest
  cancel-in-progress: false

jobs:
  build-shadow-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out Stage 4 shadow branch
        uses: actions/checkout@v4
        with:
          ref: stage4-morning-portfolio
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install current project dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore latest accumulated news window
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          STATE_ARTIFACT_NAME: stage4-news-window
        run: |
          set -euo pipefail
          mkdir -p state accumulator_artifact

          python - <<'PYRESTORE'
          from __future__ import annotations

          import json
          import os
          import shutil
          import urllib.error
          import urllib.request
          import zipfile
          from pathlib import Path

          token = os.environ["GH_TOKEN"]
          repository = os.environ["GITHUB_REPOSITORY"]
          artifact_name = os.environ["STATE_ARTIFACT_NAME"]


          class NoRedirect(urllib.request.HTTPRedirectHandler):
              def redirect_request(self, req, fp, code, msg, headers, newurl):
                  return None


          def download_artifact_archive(download_url, api_headers, zip_path):
              opener = urllib.request.build_opener(NoRedirect())
              request = urllib.request.Request(download_url, headers=api_headers)
              try:
                  with opener.open(request, timeout=120) as response:
                      zip_path.write_bytes(response.read())
                      return
              except urllib.error.HTTPError as error:
                  if error.code not in {301, 302, 303, 307, 308}:
                      raise
                  location = error.headers.get("Location")
                  if not location:
                      raise RuntimeError(
                          "Artifact download redirect did not include a Location header"
                      ) from error

              # GitHub redirects artifact downloads to a short-lived signed URL on
              # another host. Do not forward the GitHub Authorization header there.
              redirected_request = urllib.request.Request(
                  location,
                  headers={"User-Agent": api_headers["User-Agent"]},
              )
              with urllib.request.urlopen(redirected_request, timeout=120) as response:
                  zip_path.write_bytes(response.read())

          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "User-Agent": "stage4-accumulated-shadow-digest",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          list_url = (
              f"https://api.github.com/repos/{repository}/actions/artifacts"
              f"?name={artifact_name}&per_page=100"
          )
          request = urllib.request.Request(list_url, headers=headers)
          with urllib.request.urlopen(request, timeout=60) as response:
              payload = json.load(response)

          candidates = [
              item for item in payload.get("artifacts", [])
              if not item.get("expired", False)
          ]
          candidates.sort(key=lambda item: item.get("created_at", ""), reverse=True)
          if not candidates:
              raise RuntimeError(
                  "No accumulated news artifact exists yet. "
                  "Wait for one successful Stage 4 Hourly News Accumulator run."
              )

          latest = candidates[0]
          zip_path = Path("accumulator_artifact/news_window.zip")
          download_artifact_archive(latest["archive_download_url"], headers, zip_path)

          with zipfile.ZipFile(zip_path) as archive:
              archive.extractall("accumulator_artifact/unpacked")

          matches = list(Path("accumulator_artifact/unpacked").rglob("news_window.json"))
          if len(matches) != 1:
              raise RuntimeError(
                  f"Expected one news_window.json in artifact, found {len(matches)}"
              )
          shutil.copy2(matches[0], "state/news_window.json")

          state = json.loads(Path("state/news_window.json").read_text(encoding="utf-8"))
          if not isinstance(state.get("articles"), list):
              raise RuntimeError("Accumulator state has no valid articles list")
          if not state.get("articles"):
              raise RuntimeError("Accumulator state is empty")

          print(
              f"Restored artifact {latest['id']} created at "
              f"{latest.get('created_at')} with {len(state['articles'])} records."
          )
          PYRESTORE

      - name: Build accumulated shadow digest
        shell: bash
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          PYTHONUNBUFFERED: "1"
          TELEGRAM_BOT_TOKEN: "0000000000:SHADOW_PLACEHOLDER_DO_NOT_SEND"
          TELEGRAM_CHAT_ID: "0"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
