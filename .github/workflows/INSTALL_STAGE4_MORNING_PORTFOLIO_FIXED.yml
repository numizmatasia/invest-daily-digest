      - name: Verify hard guards and protected files
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PYVERIFY'
          import hashlib
          import json
          from pathlib import Path

          config = json.loads(Path('config/stage4/SHADOW_RUNTIME_REQUIREMENTS.json').read_text(encoding='utf-8'))
          guards = config['hard_guards']
          assert config['mode'] == 'SHADOW_ONLY'
          assert guards['modify_main_py'] is False
          assert guards['modify_daily_workflow'] is False
          assert guards['stateless_bypass'] is False
          assert guards['guess_unknown_thresholds'] is False
          assert guards['keyword_is_event_proof'] is False
          assert guards['production_delivery_enabled'] is False
          assert not Path('stage4/hunting.py').exists()
          assert not Path('stage4/market_data.py').exists()

          baseline = json.loads(Path('docs/STAGE4_PROTECTED_BASELINES_v2.0.json').read_text(encoding='utf-8'))
          failures = []
          for item in baseline['files']:
              path = Path(item['path'])
              if not path.is_file():
                  failures.append(f"missing protected file: {path}")
              elif hashlib.sha256(path.read_bytes()).hexdigest() != item['sha256']:
                  failures.append(f"changed protected file: {path}")
          if failures:
              raise SystemExit('\n'.join(failures))
          print(f"Protected files PASS: {len(baseline['files'])}")
          PYVERIFY

      - name: Verify exact allowed change set
        shell: bash
        run: |
          set -euo pipefail
          find . -type d -name '__pycache__' -prune -exec rm -rf {} +
          find . -type d -name '.pytest_cache' -prune -exec rm -rf {} +
          find . -type f \( -name '*.pyc' -o -name '*.pyo' \) -delete
          git diff --exit-code
          python - <<'PYCHANGES'
          import json
          import subprocess
          from pathlib import Path

          manifest = json.loads(Path('docs/STAGE4_PACKAGE_MANIFEST_v2.0.json').read_text(encoding='utf-8'))
          expected = {item['path'] for item in manifest['files']}
          expected.add('docs/STAGE4_PACKAGE_MANIFEST_v2.0.json')
          expected.add('docs/STAGE4_PROTECTED_BASELINES_v2.0.json')
          actual = set(subprocess.check_output(
              ['git', 'ls-files', '--others', '--exclude-standard'], text=True
          ).splitlines())
          if actual != expected:
              raise SystemExit(f"Unexpected change set. expected={sorted(expected)} actual={sorted(actual)}")
          print(f"Allowed change set PASS: {len(actual)} new files")
          PYCHANGES

