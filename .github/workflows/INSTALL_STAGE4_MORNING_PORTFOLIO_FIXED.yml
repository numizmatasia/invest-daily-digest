name: Install and Test Stage 4 Morning Portfolio Shadow v2 Fixed

on:
  push:
    branches:
      - stage3-foundation
    paths:
      - ".github/workflows/INSTALL_STAGE4_MORNING_PORTFOLIO_FIXED.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: install-stage4-morning-portfolio-fixed
  cancel-in-progress: false

jobs:
  install-and-test:
    if: github.repository == 'numizmatasia/invest-daily-digest'
    runs-on: ubuntu-latest
    timeout-minutes: 35

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: invest
          POSTGRES_PASSWORD: invest_test
          POSTGRES_DB: invest_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U invest -d invest_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgresql://invest:invest_test@localhost:5432/invest_test
      RELEASE_GATE_TARGET: main.py
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      TARGET_BRANCH: stage4-morning-portfolio
      PACKAGE_ARCHIVE_SHA256: 872dea1a74f8ce85829a15e07fbabaa7e1972a28049fb60a868a6dd2ab65bdc0

    steps:
      - name: Check out approved Stage 3 foundation
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify source branch and prerequisites
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_REPOSITORY" = "numizmatasia/invest-daily-digest"
          test "$GITHUB_REF_NAME" = "stage3-foundation"
          test -f main.py
          test -f test_release_gate.py
          test -f requirements.txt
          test -f requirements-stage3.txt
          test -f portfolio.json
          test -f watchlist.json
          test -d infra
          test -d storage
          test -d tests/stage3
          if git ls-remote --exit-code --heads origin "$TARGET_BRANCH" >/dev/null 2>&1; then
            echo "Target branch $TARGET_BRANCH already exists. Refusing to overwrite it."
            exit 1
          fi

      - name: Capture immutable baseline and create isolated branch
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PYBASELINE'
          import hashlib
          import json
          import subprocess
          from pathlib import Path

          raw = subprocess.check_output(['git', 'ls-files', '-z'])
          files = []
          for value in raw.split(b'\0'):
              if not value:
                  continue
              path = Path(value.decode('utf-8'))
              if not path.is_file():
                  raise SystemExit(f"Tracked prerequisite missing: {path}")
              files.append({
                  'path': path.as_posix(),
                  'sha256': hashlib.sha256(path.read_bytes()).hexdigest(),
              })
          baseline = {
              'schema_version': '2.0',
              'baseline': 'all tracked files in stage3-foundation before Stage 4 installation',
              'source_commit': subprocess.check_output(['git', 'rev-parse', 'HEAD'], text=True).strip(),
              'files': sorted(files, key=lambda item: item['path']),
          }
          Path('/tmp/STAGE4_PROTECTED_BASELINES_v2.0.json').write_text(
              json.dumps(baseline, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          print(f"Protected baseline captured: {len(files)} files")
          PYBASELINE
          git switch -c "$TARGET_BRANCH"

      - name: Decode verify and install Stage 4 payload
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/stage4_payload.b64 <<'PAYLOAD'
          H4sIAAAAAAAC/+29a3Mby5Ug6M/8FTXV3SHgGoTwBggbDuOSkIS5FEnzca9v04xSAVUQYYEAjAIk
